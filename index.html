        function syncOtherWorksVisibility() {
          const panel = document.querySelector("#other-works");
          if (!panel) return;

          const shouldShow = window.location.hash === "#other-works";
          panel.hidden = !shouldShow;
          panel.setAttribute("aria-hidden", String(!shouldShow));
          document.querySelectorAll('.nav-link[href="#other-works"]').forEach((link) => {
            if (shouldShow) {
              link.setAttribute("aria-current", "page");
            } else {
              link.removeAttribute("aria-current");
            }
          });

          if (shouldShow) {
            window.requestAnimationFrame(() => panel.scrollIntoView({ block: "start" }));
          }
        }

        function ensureOtherWorksNav() {
          document.querySelectorAll(".site-header .nav-links").forEach((nav) => {
            if (nav.querySelector('[href="#other-works"]')) return;

            const link = document.createElement("a");
            link.className = "nav-link";
            link.href = "#other-works";
            link.innerHTML = "<span>其他作品 / OTHER WORKS</span>";
            const contactLink = nav.querySelector('[href="#contact"]');
            const resumeLink = nav.querySelector(".nav-link--resume");
            nav.insertBefore(link, contactLink || resumeLink || null);
          });
        }

        function installOtherWorks() {
          const works = document.querySelector("#works");
          const commercial = document.querySelector("#commercial-visuals");
          if (!works || !commercial) {
            ensureOtherWorksNav();
            syncOtherWorksVisibility();
            return Boolean(works);
          }

          works.querySelectorAll(".works-map__category").forEach((category) => {
            if (category.textContent.includes("Commercial Visual & Event Materials")) category.remove();
          });

          const worksMap = works.querySelector(".works-map");
          if (worksMap && worksMap.children.length === 1) worksMap.classList.add("works-map--single");

          let panel = document.querySelector("#other-works");
          if (!panel) {
            panel = document.createElement("section");
            panel.className = "section section--works other-works-panel";
            panel.id = "other-works";
            panel.hidden = true;
            panel.setAttribute("aria-hidden", "true");
            panel.innerHTML = `
              <div class="works-curated">
                <div class="section-heading section-heading--split">
                  <div>
                    <span class="section-number">04</span>
                    <h2>其他作品 / OTHER WORKS</h2>
                  </div>
                </div>
              </div>
            `;

            const skills = document.querySelector("#skills");
            if (skills?.parentNode) {
              skills.parentNode.insertBefore(panel, skills);
            } else {
              works.insertAdjacentElement("afterend", panel);
            }
          }

          const panelContent = panel.querySelector(".works-curated");
          if (panelContent && commercial.parentElement !== panelContent) {
            panelContent.appendChild(commercial);
          }

          ensureOtherWorksNav();
          syncOtherWorksVisibility();
          return true;
        }

        function installOtherWorksNavigation() {
          ensureOtherWorksNav();
          if (document.documentElement.dataset.otherWorksNavInstalled === "true") {
            syncOtherWorksVisibility();
            return;
          }

          document.documentElement.dataset.otherWorksNavInstalled = "true";
          window.addEventListener("hashchange", () => {
            installOtherWorks();
            syncOtherWorksVisibility();
          });
          document.addEventListener("click", (event) => {
            const trigger = event.target.closest?.('a[href="#other-works"]');
            if (!trigger) return;
            installOtherWorks();
          });
          syncOtherWorksVisibility();
        }

        function installLightbox() {
          if (document.querySelector(".portfolio-lightbox")) return;

          const lightbox = document.createElement("div");
          lightbox.className = "portfolio-lightbox";
          lightbox.setAttribute("role", "dialog");
          lightbox.setAttribute("aria-modal", "true");
          lightbox.setAttribute("aria-label", "作品图片预览");
          lightbox.innerHTML = '<div class="portfolio-lightbox__bar"><span></span><button type="button">关闭</button></div><div class="portfolio-lightbox__frame"><img alt="" /></div>';
          document.body.appendChild(lightbox);

          const title = lightbox.querySelector(".portfolio-lightbox__bar span");
          const closeButton = lightbox.querySelector("button");
          const image = lightbox.querySelector("img");

          function close() {
            lightbox.classList.remove("is-open");
            image.removeAttribute("src");
            image.alt = "";
          }

          document.addEventListener("click", (event) => {
            const trigger = event.target.closest(".js-lightbox");
            if (!trigger) return;

            event.preventDefault();
            const label = trigger.dataset.title || trigger.querySelector("img")?.alt || "作品图片预览";
            image.src = trigger.getAttribute("href");
            image.alt = label;
            title.textContent = label;
            lightbox.classList.add("is-open");
          });

          closeButton.addEventListener("click", close);
          lightbox.addEventListener("click", (event) => {
            if (event.target === lightbox || event.target.classList.contains("portfolio-lightbox__frame")) close();
          });
          document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && lightbox.classList.contains("is-open")) close();
          });
        }

              if (!portraitBox || !contentBox) return;
              portraitBox.style.height = "";
              portraitBox.style.transform = "";
              if (!window.matchMedia("(min-width: 821px)").matches) return;
              const portraitRect = portraitBox.getBoundingClientRect();
              const contentRect = contentBox.getBoundingClientRect();
              const topDelta = portraitRect.top - contentRect.top;
              let targetHeight = contentRect.height;
              let targetOffset = -topDelta;
              portraitBox.style.height = `${targetHeight}px`;
              portraitBox.style.transform = `translateY(${targetOffset}px)`;

                const residualTop = adjustedPortraitRect.top - adjustedContentRect.top;
                const residualBottom = adjustedPortraitRect.bottom - adjustedContentRect.bottom;
                targetOffset -= residualTop;
                targetHeight += residualTop - residualBottom;
                portraitBox.style.height = `${targetHeight}px`;
